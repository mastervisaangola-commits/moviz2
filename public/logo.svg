<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Premium Metallic Silver Gradients -->
    <linearGradient id="mBodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="60%" stop-color="#F2F2F2" />
      <stop offset="100%" stop-color="#D5D5D5" />
    </linearGradient>
    
    <linearGradient id="playButtonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9A9A9A" />
      <stop offset="30%" stop-color="#CCCCCC" />
      <stop offset="100%" stop-color="#FFFFFF" />
    </linearGradient>
    
    <!-- Subtle Drop Shadow for depth -->
    <filter id="premiumShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <g filter="url(#premiumShadow)">
    <!-- Main M Body (Left Pillar and Center V-shape) -->
    <path d="M 120,150 
             L 185,150 
             L 185,340 
             L 120,340 
             Z" 
          fill="url(#mBodyGrad)" />
          
    <path d="M 185,150 
             L 270,245 
             L 355,150 
             L 420,150 
             L 420,230 
             L 375,275 
             L 375,210 
             L 270,325 
             L 185,230 
             Z" 
          fill="url(#mBodyGrad)" />

    <!-- Play Button Triangle (Bottom-Right) -->
    <path d="M 375,240 
             L 375,340 
             L 485,290 
             Z" 
          fill="url(#playButtonGrad)" />
  </g>
</svg>
